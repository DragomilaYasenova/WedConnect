<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Additional Profile</title>
    <link rel="stylesheet" type="text/css" href="../../static/css/styles.css">
</head>
<body>
    <div class="container-profile">
        <h1>We're thrilled to have you on board.<br>
            To get the most out of our features, please take a moment to complete your profile.
        </h1>
        <form class="profile-form" th:action="@{|/client/profile/${client.id}|}" th:object="${client}" method="post">
            <div class="left">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="name" th:field="*{name}" required>
            </div>

            <div class="right">
                <label for="phone-number">Phone Number</label>
                <input type="text" id="phone-number" placeholder="00-0000-0000" th:field="*{phoneNumber}" required>
            </div>

            <input type="hidden" th:field="*{id}"/>
            <button type="submit">Confirm</button>
        </form>
    </div>
</body>
</html>
