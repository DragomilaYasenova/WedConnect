<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="EN">
<head>
    <title>Sign In</title>
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <link rel="stylesheet" type="text/css" href="/css/grid.css">
    <link rel="stylesheet" type="text/css" href="/css/base.css">
</head>
<body>
<div class="container-login">
    <div class="lace-top">
        <object data="/svg/lace-horizontal-top.svg"></object>
    </div>

    <div class="lace-top">
        <object data="/svg/lace-horizontal-top.svg" id="item1-right"></object>
    </div>

    <div class="lace-bottom">
        <object data="/svg/lace-horizontal-bottom.svg"></object>
    </div>

    <div class="lace-bottom">
        <object data="/svg/lace-horizontal-bottom.svg" id="item2-right"></object>
    </div>

    <div class="border-left"></div>
    <div class="border-right"></div>

    <div class="form-section" id="login-form">
        <form class="signup-form" th:action="@{/login}" th:object="${user}" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="username" th:field="*{username}" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="..........." th:field="*{password}" required>

            <button type="submit" class="button">Sign In</button>
            <a href="#" class="login-link" th:href="@{/register}">I don't have an account yet</a>

            <div class = "container-message">
                <div th:if="${errorMessage}" class="error-message">
                    <p th:text="${errorMessage}"></p>
                </div>
                <div th:unless="${errorMessage}" class="no-message">
                    <p> </p>
                </div>
            </div>
        </form>

    </div>

    <div class="text-section" id="login-text">
        <h2>Welcome Back!</h2>
    </div>

</div>

</body>
</html>
